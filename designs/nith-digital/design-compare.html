<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nith Digital — Design Comparison</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #fff; }
  .tab-row {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; flex-direction: column;
    background: #111; border-bottom: 1px solid #222;
  }
  .tab-group-label {
    text-align: center; font-size: 10px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.1em;
    padding: 6px 0 0; color: #444;
  }
  .tabs {
    display: flex; gap: 0;
    overflow-x: auto; -webkit-overflow-scrolling: touch;
  }
  .tab {
    flex: 1; min-width: 0;
    padding: 10px 8px;
    text-align: center;
    font-size: 12px; font-weight: 500;
    color: #555;
    cursor: pointer;
    border: none; background: none;
    border-bottom: 2px solid transparent;
    transition: color 0.3s, border-color 0.3s;
    white-space: nowrap;
  }
  .tab:hover { color: #aaa; }
  .tab.active { color: #fff; border-bottom-color: #fff; }
  .tab .tab-number {
    display: inline-block; width: 20px; height: 20px;
    border-radius: 50%; background: #222;
    font-size: 10px; line-height: 20px; text-align: center;
    margin-right: 4px;
  }
  .tab.active .tab-number { background: #fff; color: #000; }
  .tab .tab-name { font-weight: 600; }
  .tab .tab-subtitle { font-weight: 400; color: #444; font-size: 10px; display: block; margin-top: 1px; }
  .tab.active .tab-subtitle { color: #888; }
  .tab.light-tab.active { border-bottom-color: #E85D3A; }
  .tab.light-tab.active .tab-number { background: #E85D3A; color: #fff; }
  .divider { width: 1px; background: #222; margin: 6px 0; flex-shrink: 0; }
  iframe {
    position: fixed; top: 72px; left: 0; width: 100%; height: calc(100vh - 72px);
    border: none; background: #000;
  }
  @media (max-width: 1000px) {
    .tab { padding: 8px 6px; font-size: 10px; }
    .tab .tab-subtitle { display: none; }
    .tab .tab-number { width: 16px; height: 16px; font-size: 9px; line-height: 16px; }
  }
</style>
</head>
<body>

<div class="tab-row">
  <div class="tabs">
    <button class="tab" onclick="show(1, this)">
      <span class="tab-number">1</span>
      <span class="tab-name">Midnight Signal</span>
      <span class="tab-subtitle">dark — word reveals</span>
    </button>
    <button class="tab" onclick="show(2, this)">
      <span class="tab-number">2</span>
      <span class="tab-name">Living Portfolio</span>
      <span class="tab-subtitle">dark — video cards</span>
    </button>
    <button class="tab" onclick="show(3, this)">
      <span class="tab-number">3</span>
      <span class="tab-name">Quiet Depth</span>
      <span class="tab-subtitle">dark — sticky cards</span>
    </button>
    <button class="tab" onclick="show(4, this)">
      <span class="tab-number">4</span>
      <span class="tab-name">Molten Surface</span>
      <span class="tab-subtitle">dark — lava lamp</span>
    </button>
    <button class="tab" onclick="show(5, this)">
      <span class="tab-number">5</span>
      <span class="tab-name">Parallel Motion</span>
      <span class="tab-subtitle">dark — parallax</span>
    </button>
    <div class="divider"></div>
    <button class="tab light-tab active" onclick="show(6, this)">
      <span class="tab-number">6</span>
      <span class="tab-name">Warm Current</span>
      <span class="tab-subtitle">light — fluid blobs</span>
    </button>
    <button class="tab light-tab" onclick="show(7, this)">
      <span class="tab-number">7</span>
      <span class="tab-name">Clean Slate</span>
      <span class="tab-subtitle">light — editorial</span>
    </button>
    <button class="tab light-tab" onclick="show(8, this)">
      <span class="tab-number">8</span>
      <span class="tab-name">Day & Night</span>
      <span class="tab-subtitle">split — dark hero/light body</span>
    </button>
  </div>
</div>

<iframe id="viewer" src="design-6.html"></iframe>

<script>
function show(n, el) {
  document.getElementById('viewer').src = 'design-' + n + '.html';
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
}
</script>

</body>
</html>
