<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nith Digital — Design Comparison</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #fff; }
  .tabs {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; gap: 0;
    background: #111; border-bottom: 1px solid #222;
    overflow-x: auto; -webkit-overflow-scrolling: touch;
  }
  .tab {
    flex: 1; min-width: 0;
    padding: 14px 12px;
    text-align: center;
    font-size: 13px; font-weight: 500;
    color: #666;
    cursor: pointer;
    border: none; background: none;
    border-bottom: 2px solid transparent;
    transition: color 0.3s, border-color 0.3s;
    white-space: nowrap;
  }
  .tab:hover { color: #aaa; }
  .tab.active { color: #fff; border-bottom-color: #fff; }
  .tab .tab-number {
    display: inline-block; width: 22px; height: 22px;
    border-radius: 50%; background: #222;
    font-size: 11px; line-height: 22px; text-align: center;
    margin-right: 6px;
  }
  .tab.active .tab-number { background: #fff; color: #000; }
  .tab .tab-name { font-weight: 600; }
  .tab .tab-subtitle { font-weight: 400; color: #555; font-size: 11px; display: block; margin-top: 2px; }
  .tab.active .tab-subtitle { color: #888; }
  iframe {
    position: fixed; top: 56px; left: 0; width: 100%; height: calc(100vh - 56px);
    border: none; background: #000;
  }
  @media (max-width: 900px) {
    .tab { padding: 10px 8px; font-size: 11px; }
    .tab .tab-subtitle { display: none; }
    .tab .tab-number { width: 18px; height: 18px; font-size: 10px; line-height: 18px; margin-right: 4px; }
  }
</style>
</head>
<body>

<div class="tabs">
  <button class="tab active" onclick="show(1, this)">
    <span class="tab-number">1</span>
    <span class="tab-name">Midnight Signal</span>
    <span class="tab-subtitle">lusion.co — word reveals</span>
  </button>
  <button class="tab" onclick="show(2, this)">
    <span class="tab-number">2</span>
    <span class="tab-name">Living Portfolio</span>
    <span class="tab-subtitle">makebuild — video cards</span>
  </button>
  <button class="tab" onclick="show(3, this)">
    <span class="tab-number">3</span>
    <span class="tab-name">Quiet Depth</span>
    <span class="tab-subtitle">pumo — sticky cards</span>
  </button>
  <button class="tab" onclick="show(4, this)">
    <span class="tab-number">4</span>
    <span class="tab-name">Molten Surface</span>
    <span class="tab-subtitle">kota — lava lamp</span>
  </button>
  <button class="tab" onclick="show(5, this)">
    <span class="tab-number">5</span>
    <span class="tab-name">Parallel Motion</span>
    <span class="tab-subtitle">mallard — scroll parallax</span>
  </button>
</div>

<iframe id="viewer" src="design-1.html"></iframe>

<script>
function show(n, el) {
  document.getElementById('viewer').src = 'design-' + n + '.html';
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
}
</script>

</body>
</html>
