<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Akin Yavuz — Design Comparison</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#111;color:#fff}
.tab-bar{
  display:flex;
  position:sticky;top:0;z-index:1000;
  background:#1a1a1a;
  border-bottom:2px solid #333;
}
.tab{
  flex:1;
  padding:14px 20px;
  text-align:center;
  font-size:13px;
  font-weight:600;
  letter-spacing:.02em;
  color:#888;
  cursor:pointer;
  border-right:1px solid #333;
  transition:background .2s,color .2s;
  user-select:none;
}
.tab:last-child{border-right:none}
.tab:hover{background:#222;color:#ccc}
.tab.active{
  background:#C8963E;
  color:#fff;
}
.tab .tab-num{
  display:inline-block;
  width:20px;height:20px;
  line-height:20px;
  text-align:center;
  border-radius:50%;
  background:rgba(255,255,255,.15);
  font-size:11px;
  margin-right:8px;
}
.tab.active .tab-num{background:rgba(255,255,255,.3)}
iframe{
  width:100%;
  height:calc(100vh - 50px);
  border:none;
  display:none;
}
iframe.active{display:block}
</style>
</head>
<body>

<div class="tab-bar">
  <div class="tab active" onclick="switchTab(0)">
    <span class="tab-num">13</span>Canvas
  </div>
  <div class="tab" onclick="switchTab(1)">
    <span class="tab-num">14</span>Ink & Light
  </div>
  <div class="tab" onclick="switchTab(2)">
    <span class="tab-num">15</span>Noir
  </div>
</div>

<iframe id="frame-0" class="active" src="design-13.html"></iframe>
<iframe id="frame-1" src="design-14.html"></iframe>
<iframe id="frame-2" src="design-15.html"></iframe>

<script>
function switchTab(idx) {
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === idx));
  document.querySelectorAll('iframe').forEach((f, i) => f.classList.toggle('active', i === idx));
}
</script>

</body>
</html>
