<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found — Nith Digital</title>
<meta http-equiv="refresh" content="5;url=https://nithdigital.uk">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--navy:#1B2A4A;--gold:#D4A84B;--gold-light:#E8C97A;--cream:#F5F0E6;--font-display:'Libre Baskerville',Georgia,serif;--font-body:'DM Sans',-apple-system,sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font-body);background:var(--cream);color:var(--navy);display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:24px}
.icon{width:64px;height:64px;background:var(--navy);border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:32px;font-weight:700;color:var(--gold);margin-bottom:32px}
h1{font-family:var(--font-display);font-size:36px;font-weight:400;margin-bottom:12px}
p{font-size:16px;color:#5A6A7A;line-height:1.7;max-width:440px;margin-bottom:28px}
a{display:inline-block;padding:12px 28px;background:var(--gold);color:var(--navy);border-radius:100px;font-size:13px;font-weight:600;text-decoration:none;transition:background 0.25s ease}
a:hover{background:var(--gold-light)}
.redirect{font-size:12px;color:#5A6A7A;margin-top:16px}
</style>
</head>
<body>
<div class="icon">N</div>
<h1>Page not found</h1>
<p>The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
<a href="https://nithdigital.uk">Back to homepage</a>
<p class="redirect">You'll be redirected automatically in 5 seconds.</p>
</body>
</html>
